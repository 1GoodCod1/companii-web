services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.companii.faber.md/api/v1}
        VITE_ENV: ${VITE_ENV:-production}
    container_name: companii-web-prod
    ports:
      - "8082:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
