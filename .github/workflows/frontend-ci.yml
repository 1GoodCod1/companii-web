name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/web

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.companii.faber.md/api/v1' }}
          VITE_ENV: production
          VITE_USE_HTTPONLY_COOKIE: 'true'
      - name: Generate sitemap
        run: npm run sitemap:generate
        env:
          SEO_API_URL: ${{ secrets.SEO_API_URL || secrets.VITE_API_URL || 'https://api.companii.faber.md' }}
          SEO_SITE_URL: ${{ secrets.SEO_SITE_URL || 'https://companii.faber.md' }}

      - name: Bundle size report
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find dist/assets -name '*.js' -exec du -h {} \; | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          TOTAL=$(find dist/assets -name '*.js' -exec cat {} + | wc -c)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total JS: ${TOTAL_KB}KB" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL_KB" -gt 1500 ]; then
            echo "::warning::Total JS bundle size (${TOTAL_KB}KB) exceeds 1500KB threshold"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 7

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'https://api.companii.faber.md/api/v1' }}
            VITE_ENV=production
            VITE_USE_HTTPONLY_COOKIE=true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/companii/companii-web
            git pull origin main
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d web
