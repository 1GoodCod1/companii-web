# Dev: Vite HMR on http://localhost:5174
# Start once: npm run docker:up
# Code changes in ./src hot-reload automatically — no rebuild needed.
# Rebuild only after package.json changes: npm run docker:build && npm run docker:up
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: companii-web-dev
    ports:
      - '5174:5174'
    env_file:
      - .env.docker
    environment:
      VITE_USE_POLLING: 'true'
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      VITE_API_URL: ${VITE_API_URL:-/api/v1}
      VITE_DEV_API_PROXY_TARGET: ${VITE_DEV_API_PROXY_TARGET:-http://host.docker.internal:4100}
      VITE_ENV: ${VITE_ENV:-development}
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  web_node_modules:
